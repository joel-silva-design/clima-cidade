<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        
        <!-- Cartão principal -->
<section class="card p-4 shadow-sm text-center" style="max-width: 420px; width: 100%;">
    
    <h2 class="h4 mb-3 fw-bold text-secondary">Digite uma Cidade:</h2>

    <!-- Campo de busca -->
    <div class="input-group mb-3">
        <input type="text" class="form-control" name="cidade" id="cidade" placeholder="Ex: São Paulo">
        <button class="btn btn-primary" type="submit" id="olhar-cidade">Procurar</button>
    </div>
    
    <!-- Mensagem de erro -->
    <i id="cidade-erro" class="text-danger fw-bold mb-3 d-block small"></i>

    <!-- Opções de Informações Adicionais (Bootstrap Form Checks) -->
    <div class="card bg-light p-2 mb-3 text-start">
        <span class="small fw-bold text-muted mb-1 d-block text-center">Informações Extras:</span>
        <div class="d-flex justify-content-around">
            <div class="form-check form-check-inline m-0">
                <input class="form-check-input" type="checkbox" id="check-sensacao" checked>
                <label class="form-check-label small" for="check-sensacao">Sensação</label>
            </div>
            <div class="form-check form-check-inline m-0">
                <input class="form-check-input" type="checkbox" id="check-umidade">
                <label class="form-check-label small" for="check-umidade">Umidade</label>
            </div>
            <div class="form-check form-check-inline m-0">
                <input class="form-check-input" type="checkbox" id="check-vento">
                <label class="form-check-label small" for="check-vento">Vento</label>
            </div>
        </div>
    </div>

    <!-- Exibição do clima principal -->
    <div class="mt-2">
        <h3 class="h5 text-muted mb-1">Temperatura:</h3>
        <p id="temperatura" class="display-6 fw-bold text-dark mb-2"></p>
        <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
            <img src="" alt="" class="img-fluid rounded bg-dark d-none" id="clima-icone" style="width: 50px; height: 50px;">
            <span id="descricao-clima" class="text-capitalize fw-semibold text-secondary"></span>
        </div>
    </div>

    <!-- Bloco Dinâmico de Detalhes Extras (Bootstrap List Group) -->
    <div id="detalhes-extras" class="list-group list-group-flush text-start d-none">
        <div id="dado-sensacao" class="list-group-item d-flex justify-content-between align-items-center px-1 py-2 d-none">
            <span class="text-muted small">🌡️ Sensação Térmica:</span>
            <span class="fw-bold target-dado">--</span>
        </div>
        <div id="dado-umidade" class="list-group-item d-flex justify-content-between align-items-center px-1 py-2 d-none">
            <span class="text-muted small">💧 Umidade do Ar:</span>
            <span class="fw-bold target-dado">--</span>
        </div>
        <div id="dado-vento" class="list-group-item d-flex justify-content-between align-items-center px-1 py-2 d-none">
            <span class="text-muted small">💨 Velocidade do Vento:</span>
            <span class="fw-bold target-dado">--</span>
        </div>
    </div>

</section>

    </div>


    <!-- Script do Bootstrap (opcional, mas recomendado) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
